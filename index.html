<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kein Chuppy Chuppy Training</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="bg-shape bg-shape-1"></div>
  <div class="bg-shape bg-shape-2"></div>

  <header class="hero">
    <p class="kicker"> Training Hub</p>
    <h1>Kein Chuppy Chuppy Training</h1>
    <p class="hero-subtitle">
      training drills collection, filterable by tags
    </p>
  </header>

  <main class="layout">
    <aside class="filters">
      <h2>Filters</h2>

      <label class="field">
        <span>Search</span>
        <input id="searchInput" type="search" placeholder="title, tags, or description..." />
      </label>

      <section class="filter-group">
        <h3>Age Group</h3>
        <div id="ageGroupFilters" class="chip-grid"></div>
      </section>

      <section class="filter-group">
        <h3>Complexity</h3>
        <div class="range-grid">
          <label class="field">
            <span>Min</span>
            <input id="complexityMin" type="number" min="1" max="10" step="1" placeholder="1" />
          </label>
          <label class="field">
            <span>Max</span>
            <input id="complexityMax" type="number" min="1" max="10" step="1" placeholder="10" />
          </label>
        </div>
      </section>

      <section class="filter-group">
        <h3>Intensity</h3>
        <div class="range-grid">
          <label class="field">
            <span>Min</span>
            <input id="intensityMin" type="number" min="1" max="10" step="1" placeholder="1" />
          </label>
          <label class="field">
            <span>Max</span>
            <input id="intensityMax" type="number" min="1" max="10" step="1" placeholder="10" />
          </label>
        </div>
      </section>

      <section class="filter-group">
        <h3>Players</h3>
        <div class="range-grid">
          <label class="field">
            <span>Min</span>
            <input id="playersMin" type="number" min="0" step="1" placeholder="0" />
          </label>
          <label class="field">
            <span>Max</span>
            <input id="playersMax" type="number" min="0" step="1" placeholder="22" />
          </label>
        </div>
      </section>

      <section class="filter-group">
        <h3>Goalkeepers</h3>
        <div class="range-grid">
          <label class="field">
            <span>Min</span>
            <input id="gksMin" type="number" min="0" step="1" placeholder="0" />
          </label>
          <label class="field">
            <span>Max</span>
            <input id="gksMax" type="number" min="0" step="1" placeholder="4" />
          </label>
        </div>
      </section>

      <section class="filter-group">
        <h3>Tags</h3>
        <button id="tagMatchToggle" class="button button-ghost tag-mode-toggle" type="button">Match any selected tag</button>
        <div id="tagFilters" class="chip-grid"></div>
      </section>

      <button id="resetFilters" class="button button-secondary" type="button">Reset Filters</button>
    </aside>

    <section class="results">
      <div class="results-head">
        <h2>Exercises</h2>
        <p id="resultCount">0 drills</p>
      </div>
      <div id="exerciseGrid" class="exercise-grid"></div>
    </section>
  </main>

  <dialog id="exerciseModal" class="modal">
    <article class="modal-body">
      <button id="closeModal" class="modal-close" type="button" aria-label="Close">&times;</button>
      <div id="modalContent"></div>
    </article>
  </dialog>

  <script src="./app.js" type="module"></script>
</body>
</html>
